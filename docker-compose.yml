version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: tohen-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: tohen
    volumes:
      - mongodb_data:/data/db
    networks:
      - tohen-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tohen-backend
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017/tohen
      DB_NAME: tohen
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
      # Add your API keys here - these should be passed from .env file
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - tohen-network
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tohen-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_API_INTERNAL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - tohen-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  tohen-network:
    driver: bridge
